# ──────────────────────────────────────────────────────────────────────────────
# cloud-run/service.yaml  (Knative Serving format — used with `gcloud run services replace`)
#
# TEMPLATE — variables in ${...} are substituted by setup/03-deploy.sh via envsubst.
#
# Five containers in a single Cloud Run service:
#   1. alloydb-omni   – AlloyDB Omni (PostgreSQL) — OLTP, GCS WAL archiving
#   2. clickhouse     – ClickHouse 24 — OLAP, required by Langfuse v3+
#   3. valkey         – Valkey 7 (Redis-compatible)
#   4. langfuse-worker – Background job processor
#   5. langfuse-web   – Next.js UI + REST/SDK API  ← ingress
#
# All containers share the same localhost network namespace and ephemeral disk
# volumes.  minScale=1 + cpu-throttling=false keeps the instance always alive.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${SERVICE_NAME}
  labels:
    cloud.googleapis.com/location: ${REGION}
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-throttling: 'false'
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '1'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      serviceAccountName: ${SERVICE_ACCOUNT_NAME}@${PROJECT_ID}.iam.gserviceaccount.com
      # ── Shared ephemeral volumes ────────────────────────────────────────────
      volumes:
        - name: alloydb-data
          emptyDir:
            sizeLimit: 20Gi
        - name: clickhouse-data
          emptyDir:
            sizeLimit: 30Gi
        - name: valkey-data
          emptyDir:
            sizeLimit: 2Gi

      containers:
        # ── 1. AlloyDB Omni ──────────────────────────────────────────────────
        # OLTP store: users, projects, API keys, settings.
        # On cold start: restores from GCS base backup then replays WAL.
        # Ongoing: archives WAL segments to GCS every ≤5 min.
        - name: alloydb-omni
          image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPO}/alloydb-omni:latest
          resources:
            limits:
              cpu: '2'
              memory: 4Gi
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data
            - name: POSTGRES_USER
              value: ${POSTGRES_USER}
            - name: POSTGRES_DB
              value: ${POSTGRES_DB}
            - name: GCS_WAL_BUCKET
              value: ${GCS_WAL_BUCKET}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-db-password
                  key: latest
          volumeMounts:
            - name: alloydb-data
              mountPath: /var/lib/postgresql/data
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ${POSTGRES_USER}
                - -d
                - ${POSTGRES_DB}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 120   # up to 10 min for WAL replay
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ${POSTGRES_USER}
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

        # ── 2. ClickHouse ─────────────────────────────────────────────────────
        # OLAP store: traces, observations, sessions, scores.
        # Required by Langfuse v3+ — not optional.
        # On cold start: if a GCS backup exists the entrypoint-wrapper starts CH,
        # runs RESTORE ALL FROM S3(...), then re-execs CH as PID 1.
        - name: clickhouse
          image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPO}/clickhouse:latest
          resources:
            limits:
              cpu: '2'
              memory: 4Gi
          env:
            - name: GCS_WAL_BUCKET
              value: ${GCS_WAL_BUCKET}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-password
                  key: latest
            - name: GCS_HMAC_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-key
                  key: latest
            - name: GCS_HMAC_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-secret
                  key: latest
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
          startupProbe:
            exec:
              command:
                - clickhouse-client
                - --query
                - SELECT 1
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 120   # up to 10 min for large backup restore
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - clickhouse-client
                - --query
                - SELECT 1
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

        # ── 3. Valkey (Redis-compatible sidecar) ──────────────────────────────
        - name: valkey
          image: valkey/valkey:7-alpine
          command: [valkey-server]
          args:
            - --save
            - '60'
            - '1'
            - --loglevel
            - notice
            - --maxmemory
            - 384mb
            - --maxmemory-policy
            - allkeys-lru
            - --dir
            - /data
            - --appendonly
            - 'no'
            - --bind
            - '127.0.0.1'
          resources:
            limits:
              cpu: '0.5'
              memory: 512Mi
          volumeMounts:
            - name: valkey-data
              mountPath: /data
          startupProbe:
            exec:
              command: [valkey-cli, ping]
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 15
            timeoutSeconds: 2
          livenessProbe:
            exec:
              command: [valkey-cli, ping]
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

        # ── 4. Langfuse Worker (background job sidecar) ───────────────────────
        - name: langfuse-worker
          image: langfuse/langfuse-worker:3
          resources:
            limits:
              cpu: '1'
              memory: 1Gi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-database-url
                  key: latest
            - name: REDIS_HOST
              value: '127.0.0.1'
            - name: REDIS_PORT
              value: '6379'
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-encryption-key
                  key: latest
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-salt
                  key: latest
            # ClickHouse — required by Langfuse v3+
            # CLICKHOUSE_URL      → HTTP interface  (@clickhouse/client)     port 8123
            # CLICKHOUSE_MIGRATION_URL → native TCP (migration runner)       port 9000
            - name: CLICKHOUSE_URL
              value: http://127.0.0.1:8123
            - name: CLICKHOUSE_MIGRATION_URL
              value: clickhouse://127.0.0.1:9000
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-password
                  key: latest
            - name: LANGFUSE_LOG_LEVEL
              value: info
            # GCS as S3-compatible blob store
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ENABLED
              value: 'true'
            - name: LANGFUSE_S3_MEDIA_UPLOAD_BUCKET
              value: ${GCS_WAL_BUCKET}
            - name: LANGFUSE_S3_ENDPOINT
              value: https://storage.googleapis.com
            - name: LANGFUSE_S3_REGION
              value: auto
            - name: LANGFUSE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-key
                  key: latest
            - name: LANGFUSE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-secret
                  key: latest
          dependsOn:
            - alloydb-omni
            - clickhouse
            - valkey

        # ── 5. Langfuse Web / API (ingress container) ─────────────────────────
        - name: langfuse-web
          image: langfuse/langfuse:3
          ports:
            - name: http1
              containerPort: 3000
          resources:
            limits:
              cpu: '2'
              memory: 2Gi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-database-url
                  key: latest
            - name: REDIS_HOST
              value: '127.0.0.1'
            - name: REDIS_PORT
              value: '6379'
            - name: NEXTAUTH_URL
              value: https://${SERVICE_URL}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-nextauth-secret
                  key: latest
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-salt
                  key: latest
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-encryption-key
                  key: latest
            # ClickHouse — required by Langfuse v3+
            # CLICKHOUSE_URL      → HTTP interface  (@clickhouse/client)     port 8123
            # CLICKHOUSE_MIGRATION_URL → native TCP (migration runner)       port 9000
            - name: CLICKHOUSE_URL
              value: http://127.0.0.1:8123
            - name: CLICKHOUSE_MIGRATION_URL
              value: clickhouse://127.0.0.1:9000
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-password
                  key: latest
            - name: TELEMETRY_ENABLED
              value: 'false'
            - name: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
              value: 'true'
            # GCS blob store
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ENABLED
              value: 'true'
            - name: LANGFUSE_S3_MEDIA_UPLOAD_BUCKET
              value: ${GCS_WAL_BUCKET}
            - name: LANGFUSE_S3_ENDPOINT
              value: https://storage.googleapis.com
            - name: LANGFUSE_S3_REGION
              value: auto
            - name: LANGFUSE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-key
                  key: latest
            - name: LANGFUSE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-secret
                  key: latest
          dependsOn:
            - alloydb-omni
            - clickhouse
            - valkey
          startupProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 24   # 4 minutes
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

  traffic:
    - percent: 100
      latestRevision: true
